name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v2
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install build-essential check valgrind lcov doxygen graphviz clang-format cppcheck
    
    - name: Build library
      id: build_step
      run: |
        cd src/fsm
        if make build 2> build_error.log; then
          echo "BUILD_STATUS=success" >> $GITHUB_ENV
        else
          echo "BUILD_STATUS=failure" >> $GITHUB_ENV
          # Создаем артефакт с логами ошибок
          mkdir -p ../build_logs
          cp build_error.log ../build_logs/
        fi
    
    - name: Upload artifacts
      if: env.BUILD_STATUS == 'success'
      uses: actions/upload-artifact@v4
      with:
        name: fsm-library
        path: |
          src/fsm/build/
          src/fsm/s21_fsm.h
        retention-days: 5

    - name: Upload build logs
      if: env.BUILD_STATUS == 'failure'
      uses: actions/upload-artifact@v4
      with:
        name: build-errors
        path: build_logs/
        retention-days: 5

    - name: Get artifact download URL
      if: env.BUILD_STATUS == 'success'
      id: get_artifact_url
      run: |
        # Получаем ID последнего запуска
        RUN_ID=${{ github.run_id }}
        
        # Получаем список артефактов
        ARTIFACTS_RESPONSE=$(curl -s -X GET \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github.v3+json" \
          "https://api.github.com/repos/${{ github.repository }}/actions/runs/${RUN_ID}/artifacts")
        
        # Извлекаем URL для артефакта fsm-library
        # Извлекаем ID артефакта fsm-library
        ARTIFACT_ID=$(echo $ARTIFACTS_RESPONSE | jq -r '.artifacts[] | select(.name=="fsm-library") | .id')
        
        if [ -n "$ARTIFACT_ID" ] && [ "$ARTIFACT_ID" != "null" ]; then
          echo "ARTIFACT_ID=$ARTIFACT_ID" >> $GITHUB_ENV
        fi
    
    - name: Send Telegram Notification (Build Success)
      if: env.BUILD_STATUS == 'success' && env.ARTIFACT_API_URL != ''
      run: |
        TEXT="✅ Сборка успешна! %0A%0A Проект: ${GITHUB_REPOSITORY}%0AВетка: ${GITHUB_REF_NAME}%0A%0AАртефакт сборки доступен по ссылке: %0A https://github.com/${GITHUB_REPOSITORY}/actions/runs/${{ github.run_id }}/artifacts/${ARTIFACT_ID} %0AСсылка действует 5 дней."
        
        curl -s --max-time 10 -d "chat_id=5671658394&disable_web_page_preview=1&text=$TEXT" "https://api.telegram.org/bot7254175446:AAF2ws9t2p4K93MDRPozESGuls8b7KASwso/sendMessage"
    
    - name: Send Telegram Notification (Build Success - No Direct URL)
      if: env.BUILD_STATUS == 'success' && (env.ARTIFACT_API_URL == '' || env.ARTIFACT_API_URL == null)
      run: |
        TEXT="✅ Сборка успешна!%0A%0AПроект: ${GITHUB_REPOSITORY}%0AВетка: ${GITHUB_REF_NAME}%0A%0AАртефакт сборки доступен по ссылке: %0A https://github.com/${GITHUB_REPOSITORY}/actions/runs/${{ github.run_id }}/artifacts/${ARTIFACT_ID} %0AСсылка действует 5 дней."
        
        curl -s --max-time 10 -d "chat_id=5671658394&disable_web_page_preview=1&text=$TEXT" "https://api.telegram.org/bot7254175446:AAF2ws9t2p4K93MDRPozESGuls8b7KASwso/sendMessage"
    
    - name: Send Telegram Notification (Build Failure)
      if: env.BUILD_STATUS == 'failure'
      run: |
        TEXT="❌ Сборка провалена!%0A%0AПроект: ${GITHUB_REPOSITORY}%0AВетка: ${GITHUB_REF_NAME}%0A%0AЛоги ошибок доступны в разделе 'Действия' → последний запуск CI → вкладка 'Артефакты'.%0A%0AСкачать логи можно по кнопке 'build-errors' в интерфейсе GitHub.%0A%0AПодробные логи сборки: %0A https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
        
        curl -s --max-time 10 -d "chat_id=5671658394&disable_web_page_preview=1&text=$TEXT" "https://api.telegram.org/bot7254175446:AAF2ws9t2p4K93MDRPozESGuls8b7KASwso/sendMessage"

  docs:
    needs: build
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v2
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install doxygen graphviz
    
    - name: Generate documentation
      if: needs.build.result == 'success'
      run: |
        cd src/fsm
        if make dvi 2> docs_error.log; then
          echo "DOCS_STATUS=success" >> $GITHUB_ENV
        else
          echo "DOCS_STATUS=failure" >> $GITHUB_ENV
        fi
    
    - name: Upload documentation
      if: env.DOCS_STATUS == 'success'
      uses: actions/upload-artifact@v4
      with:
        name: fsm-documentation
        path: src/fsm/docs/
        retention-days: 5

    - name: Get docs artifact URL
      if: env.DOCS_STATUS == 'success'
      id: get_docs_url
      run: |
        # Получаем ID последнего запуска
        RUN_ID=${{ github.run_id }}
        
        # Получаем список артефактов
        ARTIFACTS_RESPONSE=$(curl -s -X GET \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github.v3+json" \
          "https://api.github.com/repos/${{ github.repository }}/actions/runs/${RUN_ID}/artifacts")
        
        # Извлекаем URL для артефакта fsm-documentation
        # Извлекаем ID артефакта fsm-documentation
        ARTIFACT_ID=$(echo $ARTIFACTS_RESPONSE | jq -r '.artifacts[] | select(.name=="fsm-documentation") | .id')
        
        if [ -n "$ARTIFACT_ID" ] && [ "$ARTIFACT_ID" != "null" ]; then
          echo "DOCS_ARTIFACT_ID=$ARTIFACT_ID" >> $GITHUB_ENV
        fi
    
    - name: Send Telegram Notification (Docs Success)
      if: env.DOCS_STATUS == 'success' && env.DOCS_API_URL != ''
      run: |
        TEXT="✅ Документация успешно сгенерирована!%0A%0AПроект: ${GITHUB_REPOSITORY}%0AВетка: ${GITHUB_REF_NAME}%0A%0AАртефакт документации доступен по ссылке: %0A https://github.com/${GITHUB_REPOSITORY}/actions/runs/${{ github.run_id }}/artifacts/${DOCS_ARTIFACT_ID} %0A%0A Ссылка действует 5 дней.%0A%0AДокументация генерируется только после успешной сборки."
        
        curl -s --max-time 10 -d "chat_id=5671658394&disable_web_page_preview=1&text=$TEXT" "https://api.telegram.org/bot7254175446:AAF2ws9t2p4K93MDRPozESGuls8b7KASwso/sendMessage"
    
    - name: Send Telegram Notification (Docs Success - No Direct URL)
      if: env.DOCS_STATUS == 'success' && (env.DOCS_API_URL == '' || env.DOCS_API_URL == null)
      run: |
        TEXT="✅ Документация успешно сгенерирована!%0A%0AПроект: ${GITHUB_REPOSITORY}%0AВетка: ${GITHUB_REF_NAME}%0A%0AАртефакт документации доступен по ссылке: %0A https://github.com/${GITHUB_REPOSITORY}/actions/runs/${{ github.run_id }}/artifacts/${DOCS_ARTIFACT_ID} %0A%0A Ссылка действует 5 дней.%0A%0AДокументация генерируется только после успешной сборки."
        
        curl -s --max-time 10 -d "chat_id=5671658394&disable_web_page_preview=1&text=$TEXT" "https://api.telegram.org/bot7254175446:AAF2ws9t2p4K93MDRPozESGuls8b7KASwso/sendMessage"
    
    - name: Send Telegram Notification (Docs Failure)
      if: env.DOCS_STATUS == 'failure'
      run: |
        TEXT="❌ Ошибка генерации документации!%0A%0AПроект: ${GITHUB_REPOSITORY}%0AВетка: ${GITHUB_REF_NAME}%0A%0AПодробные логи генерации документации: %0A https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID} %0A%0AДокументация генерируется только после успешной сборки."
        
        curl -s --max-time 10 -d "chat_id=5671658394&disable_web_page_preview=1&text=$TEXT" "https://api.telegram.org/bot7254175446:AAF2ws9t2p4K93MDRPozESGuls8b7KASwso/sendMessage"

  linter_tests:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - uses: actions/checkout@v2
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install clang-format cppcheck
    
    - name: Run linter tests
      id: linter_test
      run: |
        cd src/fsm
        make linter-test
      continue-on-error: true
    
    - name: Set linter status
      run: |
        if [ "${{ steps.linter_test.outcome }}" = "success" ]; then
          echo "LINTER_STATUS=PASSED" >> $GITHUB_ENV
        elif [ "${{ steps.linter_test.outcome }}" = "failure" ]; then
          echo "LINTER_STATUS=FAILED" >> $GITHUB_ENV
        else
          echo "LINTER_STATUS=SKIPPED" >> $GITHUB_ENV
        fi

  unit_tests:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - uses: actions/checkout@v2
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install build-essential check
    
    - name: Run unit tests
      id: unit_test
      run: |
        cd src/fsm
        make unit-test
      continue-on-error: true
    
    - name: Set unit test status
      run: |
        if [ "${{ steps.unit_test.outcome }}" = "success" ]; then
          echo "UNIT_STATUS=PASSED" >> $GITHUB_ENV
        elif [ "${{ steps.unit_test.outcome }}" = "failure" ]; then
          echo "UNIT_STATUS=FAILED" >> $GITHUB_ENV
        else
          echo "UNIT_STATUS=SKIPPED" >> $GITHUB_ENV
        fi
    
    - name: Upload coverage artifacts
      if: success() || failure()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-artifacts
        path: |
          src/fsm/obj_cov/
          src/fsm/tests/build/
        retention-days: 5

  memory_tests:
    runs-on: ubuntu-latest
    needs: unit_tests
    
    steps:
    - uses: actions/checkout@v2
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install valgrind
    
    - name: Run memory tests
      id: mem_test
      run: |
        cd src/fsm
        make mem-test
      continue-on-error: true
    
    - name: Set memory test status
      run: |
        if [ "${{ steps.mem_test.outcome }}" = "success" ]; then
          echo "MEM_STATUS=PASSED" >> $GITHUB_ENV
        elif [ "${{ steps.mem_test.outcome }}" = "failure" ]; then
          echo "MEM_STATUS=FAILED" >> $GITHUB_ENV
        else
          echo "MEM_STATUS=SKIPPED" >> $GITHUB_ENV
        fi

  coverage:
    runs-on: ubuntu-latest
    needs: unit_tests
    
    steps:
    - uses: actions/checkout@v2
    
    - name: Download coverage artifacts
      uses: actions/download-artifact@v4
      with:
        name: coverage-artifacts
        path: src/fsm
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install lcov
    
    - name: Generate coverage report
      run: |
        cd src/fsm
        make gcov-report
    
    - name: Upload coverage
      uses: codecov/codecov-action@v1
      with:
        file: src/fsm/tests/coverage/coverage.info
    
    - name: Set coverage status
      run: |
        echo "COVERAGE_STATUS=PASSED" >> $GITHUB_ENV

  notify:
    needs: [build, linter_tests, unit_tests, memory_tests, coverage]
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v2
    
    - name: Determine test statuses
      id: status
      run: |
        # Build status
        if [ "${{ needs.build.result }}" = "success" ]; then
          echo "BUILD_STATUS=PASSED" >> $GITHUB_ENV
        elif [ "${{ needs.build.result }}" = "failure" ]; then
          echo "BUILD_STATUS=FAILED" >> $GITHUB_ENV
        else
          echo "BUILD_STATUS=SKIPPED" >> $GITHUB_ENV
        fi
        
        # Linter status (passed through from linter_tests job)
        echo "LINTER_STATUS=${{ needs.linter_tests.outputs.LINTER_STATUS }}" >> $GITHUB_ENV
        
        # Unit test status (passed through from unit_tests job)
        echo "UNIT_STATUS=${{ needs.unit_tests.outputs.UNIT_STATUS }}" >> $GITHUB_ENV
        
        # Memory test status (passed through from memory_tests job)
        echo "MEM_STATUS=${{ needs.memory_tests.outputs.MEM_STATUS }}" >> $GITHUB_ENV
        
        # Coverage status
        if [ "${{ needs.coverage.result }}" = "success" ]; then
          echo "COVERAGE_STATUS=PASSED" >> $GITHUB_ENV
        elif [ "${{ needs.coverage.result }}" = "failure" ]; then
          echo "COVERAGE_STATUS=FAILED" >> $GITHUB_ENV
        else
          echo "COVERAGE_STATUS=SKIPPED" >> $GITHUB_ENV
        fi
        
        # Overall status - success only if all tests passed or were skipped
        overall_status="success"
        for status in "$BUILD_STATUS" "$LINTER_STATUS" "$UNIT_STATUS" "$MEM_STATUS" "$COVERAGE_STATUS"; do
          if [ "$status" = "FAILED" ]; then
            overall_status="failure"
            break
          fi
        done
        echo "OVERALL_STATUS=$overall_status" >> $GITHUB_ENV
    
    - name: Send Telegram Notification
      run: |
        TEXT="Результаты тестирования CI/CD\n\n"
        TEXT+="Сборка: ${BUILD_STATUS}\n"
        TEXT+="Стилевые тесты: ${LINTER_STATUS}\n"
        TEXT+="Юнит-тесты: ${UNIT_STATUS}\n"
        TEXT+="Тесты памяти: ${MEM_STATUS}\n"
        TEXT+="Покрытие кода: ${COVERAGE_STATUS}\n\n"
        
        if [ "${OVERALL_STATUS}" = "success" ]; then
          TEXT+="✅ Все тесты пройдены успешно!"
        else
          TEXT+="❌ Один или несколько тестов завершились с ошибками."
        fi
        
        chmod +x ./.github/scripts/telegram-notify.sh
        ./.github/scripts/telegram-notify.sh "custom" "$TEXT"